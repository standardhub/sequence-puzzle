<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Puzzle</title>
    <link rel="stylesheet" href="./assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
    <div class="main">
        <div class="puzzle-header">
            <h1>Sequence</h1>
            <div class="steps">
                <img src="./assets/click.svg" height="20px" width="20px" alt="click">
                <span id="step"></span><span>steps</span>
            </div>
        </div>
        <div class="puzzle-content">
            <div class="puzzle-panel">
                <div class="row">
                    <div class="col-md-3 box"><button type="button" id="0" class="num-btn">7</button></div>
                    <div class="col-md-3 box"><button type="button" id="1" class="num-btn">5</button></div>
                    <div class="col-md-3 box"><button type="button" id="2" class="num-btn">1</button></div>
                </div>
                <div class="row">
                    <div class="col-md-3 box"><button type="button" id="3" class="num-btn">2</button></div>
                    <div class="col-md-3 box"><button type="button" id="4" class="num-btn">4</button></div>
                    <div class="col-md-3 box"><button type="button" id="5" class="num-btn">8</button></div>
                </div>
                <div class="row">
                    <div class="col-md-3 box"><button type="button" id="6" class="num-btn">3</button></div>
                    <div class="col-md-3 box"><button type="button" id="7" class="num-btn">6</button></div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="./assets/bootstrap/bootstrap.min.js"></script>

</html>
